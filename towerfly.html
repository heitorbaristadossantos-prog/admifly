<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Towerfly | Admifly</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-root"></aside>

    <main class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-3">
          <span class="topbar-title">Towerfly — Central de Alertas</span>
          <span class="badge badge-danger" id="badge-urgente" style="display:none;"></span>
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm">
            <i data-lucide="check-check" style="width:13px;height:13px;"></i>
            Marcar tudo como lido
          </button>
          <div class="topbar-avatar">H</div>
        </div>
      </header>

      <div class="page-content">

        <!-- KPIs -->
        <div class="kpi-grid">
          <div class="kpi-card k-danger">
            <div class="kpi-label">Urgentes <button class="help-btn" data-tip="Alertas que exigem ação imediata: ruptura de estoque, vencimentos hoje, faturas muito atrasadas.">?</button></div>
            <div class="kpi-value v-danger" id="kpi-urgentes">0</div>
            <span class="kpi-trend t-neutral">
              <i data-lucide="minus" style="width:13px;height:13px;"></i>
              Nenhum alerta urgente
            </span>
          </div>
          <div class="kpi-card k-warning">
            <div class="kpi-label">Atenção <button class="help-btn" data-tip="Alertas que devem ser monitorados hoje mas não são emergenciais: estoque baixo, metas em risco, vencimentos próximos.">?</button></div>
            <div class="kpi-value v-warning" id="kpi-atencao">0</div>
            <span class="kpi-trend t-neutral">
              <i data-lucide="minus" style="width:13px;height:13px;"></i>
              Nenhum alerta
            </span>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Informativos <button class="help-btn" data-tip="Avisos sem urgência: relatórios prontos, confirmações de pagamento, atualizações de sistema.">?</button></div>
            <div class="kpi-value" id="kpi-info">0</div>
            <span class="kpi-trend t-neutral">
              <i data-lucide="minus" style="width:13px;height:13px;"></i>
              Sem urgência
            </span>
          </div>
          <div class="kpi-card k-success">
            <div class="kpi-label">Resolvidos Hoje <button class="help-btn" data-tip="Alertas que já foram tratados hoje. Indica a produtividade da equipe na resolução de problemas.">?</button></div>
            <div class="kpi-value v-success" id="kpi-resolvidos">0</div>
            <span class="kpi-trend t-neutral">
              <i data-lucide="minus" style="width:13px;height:13px;"></i>
              Nenhum resolvido hoje
            </span>
          </div>
        </div>

        <!-- Filtros -->
        <div class="section-header">
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="filtrarAlertas('todos')">Todos</button>
            <button class="btn btn-ghost btn-sm" onclick="filtrarAlertas('urgente')">
              <i data-lucide="alert-triangle" style="width:12px;height:12px;color:var(--danger);"></i>
              Urgentes
            </button>
            <button class="btn btn-ghost btn-sm" onclick="filtrarAlertas('atencao')">
              <i data-lucide="alert-circle" style="width:12px;height:12px;color:var(--warning);"></i>
              Atenção
            </button>
            <button class="btn btn-ghost btn-sm" onclick="filtrarAlertas('info')">
              <i data-lucide="info" style="width:12px;height:12px;color:var(--info);"></i>
              Informativos
            </button>
          </div>
          <span class="text-muted" style="font-size:12px;">Atualizado agora há pouco</span>
        </div>

        <!-- Lista de alertas -->
        <div class="alerts-stack" id="alerts-list">

          <div id="alerts-empty" style="text-align:center;padding:60px 24px;color:var(--gray-400);">
            <div style="width:56px;height:56px;border-radius:var(--r-lg);background:var(--gray-100);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gray-300);">
              <i data-lucide="bell-off" style="width:26px;height:26px;"></i>
            </div>
            <h3 style="font-size:15px;font-weight:600;color:var(--gray-600);margin-bottom:6px;">Nenhum alerta no momento</h3>
            <p style="font-size:13px;">O sistema monitorará seu estoque, caixa e metas e criará alertas automaticamente.</p>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="js/store.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/tooltip.js"></script>
  <script>
    lucide.createIcons();

    function filtrarAlertas(tipo) {
      const items = document.querySelectorAll('#alerts-list .alert-item[data-tipo]');
      items.forEach(item => {
        item.style.display = tipo === 'todos' || item.dataset.tipo === tipo ? '' : 'none';
      });
    }
  </script>
</body>
</html>
