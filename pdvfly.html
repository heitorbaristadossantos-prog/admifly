<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PdvFly | Admifly</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-root"></aside>

    <main class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-3">
          <span class="topbar-title">PdvFly</span>
          <span class="topbar-badge open">Caixa 01 — Aberto</span>
        </div>
        <div class="topbar-right">
          <button class="btn btn-outline btn-sm">
            <i data-lucide="printer" style="width:13px;height:13px;"></i>
            Fechar Caixa
          </button>
          <div class="topbar-avatar">H</div>
        </div>
      </header>

      <div class="page-content" style="height: calc(100vh - 56px); padding-bottom: 16px;">
        <div class="pdv-grid">

          <!-- Coluna esquerda -->
          <div class="pdv-left">

            <!-- Busca -->
            <div class="pdv-search-bar">
              <div class="input-wrap" style="flex:1;">
                <i data-lucide="search" class="input-icon"></i>
                <input
                  id="pdv-search-input"
                  class="input"
                  type="text"
                  placeholder="Buscar produto por nome ou código de barras..."
                  autofocus
                />
              </div>
              <button class="btn btn-primary" onclick="adicionarProduto()">
                <i data-lucide="plus" style="width:15px;height:15px;"></i>
                Adicionar
              </button>
            </div>

            <!-- Produtos rápidos (dinâmicos do estoque) -->
            <div class="pdv-quick-products" id="pdv-quick-wrap"></div>

            <!-- Tabela de itens -->
            <div class="pdv-items-wrap">
              <div class="pdv-items-header">
                <span>Itens na Venda</span>
                <button class="btn btn-ghost btn-sm" onclick="limparCarrinho()">
                  <i data-lucide="trash-2" style="width:13px;height:13px;"></i>
                  Limpar
                </button>
              </div>
              <div class="pdv-items-scroll">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Produto</th>
                      <th style="text-align:center;">Qtd</th>
                      <th style="text-align:right;">Unit.</th>
                      <th style="text-align:right;">Total</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="pdv-tbody">
                    <tr id="pdv-empty-row">
                      <td colspan="5" style="text-align:center;padding:40px;color:var(--gray-400);">
                        <i data-lucide="shopping-bag" style="display:block;margin:0 auto 8px;width:24px;height:24px;"></i>
                        Nenhum produto adicionado ainda.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>

          <!-- Checkout -->
          <div class="pdv-checkout">
            <div class="pdv-checkout-header">
              <h2>Resumo da Venda</h2>
              <p id="pdv-operador">Caixa 01 · Operador: —</p>
            </div>

            <div class="pdv-cart" id="pdv-cart-preview">
              <p style="color:var(--gray-400);font-size:13px;text-align:center;padding:24px 0;">
                Adicione produtos para ver o resumo.
              </p>
            </div>

            <div class="pdv-totals">
              <div class="pdv-total-line">
                <span>Subtotal</span>
                <span id="subtotal-val">R$ 0,00</span>
              </div>
              <div class="pdv-total-line">
                <span>Desconto</span>
                <span>R$ 0,00</span>
              </div>
              <div class="pdv-total-final">
                <span>Total</span>
                <span id="total-val">R$ 0,00</span>
              </div>

              <div class="pdv-payment-grid">
                <button class="pdv-pay-btn" id="btn-pix" onclick="selecionarPagamento('PIX')">
                  <i data-lucide="zap" style="width:14px;height:14px;"></i> PIX
                </button>
                <button class="pdv-pay-btn" id="btn-credito" onclick="selecionarPagamento('Crédito')">
                  <i data-lucide="credit-card" style="width:14px;height:14px;"></i> Crédito
                </button>
                <button class="pdv-pay-btn" id="btn-debito" onclick="selecionarPagamento('Débito')">
                  <i data-lucide="credit-card" style="width:14px;height:14px;"></i> Débito
                </button>
                <button class="pdv-pay-btn" id="btn-dinheiro" onclick="selecionarPagamento('Dinheiro')">
                  <i data-lucide="banknote" style="width:14px;height:14px;"></i> Dinheiro
                </button>
              </div>

              <button class="btn-finalizar" onclick="finalizarVenda()">
                <i data-lucide="receipt" style="width:17px;height:17px;"></i>
                Finalizar e Emitir NF
              </button>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="js/store.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/tooltip.js"></script>
  <script>
    lucide.createIcons();

    let carrinho = [];
    let pagamentoSelecionado = null;

    // Preenche nome do operador via Auth
    document.addEventListener('DOMContentLoaded', () => {
      const nome = typeof Auth !== 'undefined' ? Auth.getNome() : 'Operador';
      document.getElementById('pdv-operador').textContent = `Caixa 01 · Operador: ${nome}`;
    });

    function brl(v) {
      return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // ── Botões rápidos dinâmicos ────────────────────────────
    function renderizarQuickButtons() {
      const wrap  = document.getElementById('pdv-quick-wrap');
      const prods = Store.getProdutos().filter(p => p.qtd > 0).slice(0, 8);
      if (prods.length === 0) {
        wrap.innerHTML = '<span style="font-size:12px;color:var(--gray-400);padding:4px 8px;">Nenhum produto em estoque.</span>';
        return;
      }
      wrap.innerHTML = prods.map(p => {
        const label = p.nome.length > 20 ? p.nome.slice(0, 20) + '…' : p.nome;
        return `<button class="pdv-quick-btn" onclick="adicionarDoCatalogo('${p.nome.replace(/'/g, "\\'")}', ${p.preco})">
          <i data-lucide="package" style="width:13px;height:13px;"></i>
          ${label}
        </button>`;
      }).join('');
      lucide.createIcons();
    }

    function adicionarDoCatalogo(nome, preco) {
      const item = carrinho.find(i => i.nome === nome);
      if (item) { item.qtd++; }
      else { carrinho.push({ nome, preco, qtd: 1 }); }
      renderizarCarrinho();
    }

    // ── Busca produto no Store pelo nome ou código ──────────
    function adicionarProduto() {
      const input = document.getElementById('pdv-search-input');
      const termo = input.value.trim().toLowerCase();
      if (!termo) return;

      const produtos   = Store.getProdutos();
      const encontrado = produtos.find(p =>
        p.nome.toLowerCase().includes(termo) ||
        (p.codigo && p.codigo.toLowerCase().includes(termo))
      );

      if (!encontrado) {
        alert(`Produto "${input.value.trim()}" não encontrado no estoque.`);
        input.select();
        return;
      }

      if (encontrado.qtd <= 0) {
        alert(`"${encontrado.nome}" está sem estoque.`);
        input.select();
        return;
      }

      const item = carrinho.find(i => i.nome === encontrado.nome);
      if (item) { item.qtd++; }
      else { carrinho.push({ nome: encontrado.nome, preco: encontrado.preco, qtd: 1 }); }
      input.value = '';
      input.focus();
      renderizarCarrinho();
    }

    function removerItem(idx) {
      carrinho.splice(idx, 1);
      renderizarCarrinho();
    }

    function limparCarrinho() {
      carrinho = [];
      pagamentoSelecionado = null;
      ['pix','credito','debito','dinheiro'].forEach(id =>
        document.getElementById('btn-' + id).classList.remove('selected'));
      renderizarCarrinho();
    }

    function renderizarCarrinho() {
      const tbody   = document.getElementById('pdv-tbody');
      const preview = document.getElementById('pdv-cart-preview');
      const subEl   = document.getElementById('subtotal-val');
      const totEl   = document.getElementById('total-val');

      if (carrinho.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--gray-400);">
          <i data-lucide="shopping-bag" style="display:block;margin:0 auto 8px;width:24px;height:24px;"></i>
          Nenhum produto adicionado ainda.
        </td></tr>`;
        preview.innerHTML = '<p style="color:var(--gray-400);font-size:13px;text-align:center;padding:24px 0;">Adicione produtos para ver o resumo.</p>';
        subEl.textContent = 'R$ 0,00';
        totEl.textContent = 'R$ 0,00';
        lucide.createIcons();
        return;
      }

      let total = 0;
      let tableHtml = '';
      let previewHtml = '';

      carrinho.forEach((item, idx) => {
        const itemTotal = item.preco * item.qtd;
        total += itemTotal;
        tableHtml += `<tr>
          <td class="td-strong">${item.nome}</td>
          <td style="text-align:center;">${item.qtd}</td>
          <td style="text-align:right;color:var(--gray-500);">${brl(item.preco)}</td>
          <td style="text-align:right;" class="td-strong">${brl(itemTotal)}</td>
          <td style="text-align:center;">
            <button onclick="removerItem(${idx})" class="btn btn-ghost btn-sm" style="padding:4px;color:var(--danger);">
              <i data-lucide="x" style="width:13px;height:13px;"></i>
            </button>
          </td>
        </tr>`;
        previewHtml += `<div class="pdv-cart-item">
          <div>
            <div class="pdv-cart-item-name">${item.nome}</div>
            <div class="pdv-cart-item-qty">${item.qtd}× ${brl(item.preco)}</div>
          </div>
          <span class="pdv-cart-item-price">${brl(itemTotal)}</span>
        </div>`;
      });

      tbody.innerHTML = tableHtml;
      preview.innerHTML = previewHtml;
      subEl.textContent = brl(total);
      totEl.textContent = brl(total);
      lucide.createIcons();
    }

    function selecionarPagamento(metodo) {
      pagamentoSelecionado = metodo;
      ['pix','credito','debito','dinheiro'].forEach(id =>
        document.getElementById('btn-' + id).classList.remove('selected'));
      const mapa = { PIX:'pix', 'Crédito':'credito', 'Débito':'debito', Dinheiro:'dinheiro' };
      document.getElementById('btn-' + mapa[metodo]).classList.add('selected');
    }

    function finalizarVenda() {
      if (carrinho.length === 0) return alert('Adicione pelo menos um produto.');
      if (!pagamentoSelecionado) return alert('Selecione a forma de pagamento.');

      const totalVenda = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
      const totalItens = carrinho.reduce((s, i) => s + i.qtd, 0);

      // Desconta estoque para cada item vendido
      carrinho.forEach(item => Store.reduzirEstoque(item.nome, item.qtd));

      Store.logVenda(totalVenda, totalItens, pagamentoSelecionado);

      alert(`✅ Venda finalizada!\nForma: ${pagamentoSelecionado}\nTotal: ${brl(totalVenda)}\n\nNota Fiscal sendo emitida...`);

      carrinho = [];
      pagamentoSelecionado = null;
      ['pix','credito','debito','dinheiro'].forEach(id =>
        document.getElementById('btn-' + id).classList.remove('selected'));
      renderizarCarrinho();
      renderizarQuickButtons(); // Atualiza botões com estoque novo
    }

    document.getElementById('pdv-search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') adicionarProduto();
    });

    // Inicializar
    renderizarQuickButtons();
  </script>
</body>
</html>
